<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Stub WebSocket to completely prevent Vite HMR client from triggering unhandled WebSocket exceptions
      const OriginalWebSocket = window.WebSocket;
      class MockWebSocket {
        constructor(url, protocols) {
          this.url = url;
          this.protocols = protocols;
          this.readyState = 0; // CONNECTING
          this.listeners = {};
          
          // Smoothly transition to OPEN state to satisfy the HMR client without throwing errors
          setTimeout(() => {
            this.readyState = 1; // OPEN
            if (this.onopen) {
              try { this.onopen({ type: 'open' }); } catch (e) {}
            }
            this.dispatchEvent('open', { type: 'open' });
          }, 50);
        }

        send(data) {
          // No-op
        }

        close(code, reason) {
          this.readyState = 3; // CLOSED
          setTimeout(() => {
            if (this.onclose) {
              try { this.onclose({ type: 'close', code: code || 1000, reason: reason || '', wasClean: true }); } catch (e) {}
            }
            this.dispatchEvent('close', { type: 'close', code: code || 1000, reason: reason || '', wasClean: true });
          }, 10);
        }

        addEventListener(type, callback) {
          if (!this.listeners[type]) this.listeners[type] = [];
          this.listeners[type].push(callback);
        }

        removeEventListener(type, callback) {
          if (!this.listeners[type]) return;
          this.listeners[type] = this.listeners[type].filter(cb => cb !== callback);
        }

        dispatchEvent(type, event) {
          if (this.listeners[type]) {
            for (const cb of this.listeners[type]) {
              try { cb(event); } catch (e) {}
            }
          }
        }
      }

      window.WebSocket = MockWebSocket;

      // Suppress benign Vite/WebSocket connection errors from showing as app crashes/overlays
      window.addEventListener('unhandledrejection', (event) => {
        const reason = event.reason;
        if (reason) {
          const msg = reason.message || String(reason);
          if (msg.includes('websocket') || msg.includes('WebSocket') || msg.includes('vite') || msg.includes('HMR')) {
            event.preventDefault();
            event.stopPropagation();
          }
        }
      }, true);

      window.addEventListener('error', (event) => {
        const msg = event.message || '';
        if (msg.includes('websocket') || msg.includes('WebSocket') || msg.includes('vite') || msg.includes('HMR')) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
